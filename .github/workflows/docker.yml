# ── When does this run? ────────────────────────────────
name: Build & Push Docker Image
on:
  push:
    branches: [ "main" ] # only on pushes to main

# ── What machine runs the job? ──────────────────────────
jobs:
  build-and-push:
    runs-on: ubuntu-latest # free Linux runner
    steps:

    # 1. Check out your code onto the runner
    - uses: actions/checkout@v4

    # 2. Set up Docker Buildx (needed for multi-platform builds)
    - uses: docker/setup-buildx-action@v3

    # 3. Log in to Docker Hub using secrets (not plain text!)
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 4. Build the image and push it
    - uses: docker/build-push-action@v5
      with:
        push: true
        # Tag with "latest" AND the exact commit SHA
        tags: |
          kinexxsolution/library-app:latest
          kinexxsolution/library-app:${{ github.sha }}
