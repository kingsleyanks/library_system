# Template only — copy to Secret.yml, fill in real values, never commit Secret.yml.
#
#   cp Secret.example.yml Secret.yml
#   # edit Secret.yml, then: kubectl apply -f Secret.yml
#
# Or create the secret without a local file:
#   kubectl create secret generic library-secrets \
#     --from-literal=django-secret-key='YOUR_KEY' \
#     --from-literal=db-password='YOUR_DB_PASSWORD' \
#     --from-literal=database-url='postgres://library_user:YOUR_DB_PASSWORD@library-db:5432/library_db'
apiVersion: v1
kind: Secret
metadata:
  name: library-secrets
type: Opaque
stringData:
  django-secret-key: change-me-before-deploy
  db-password: change-me-before-deploy
  database-url: postgres://library_user:change-me-before-deploy@library-db:5432/library_db
